{% extends "base.html" %}

{% block content %}
<section class="auth-shell">
	<div class="auth-panel">
		<p class="eyebrow">Admin Access</p>
		<h1 class="auth-title">Sign in to manage inventory</h1>
		<p class="auth-copy">Use the inventory workspace to add new titles, edit book details, and keep the storefront catalog up to date.</p>

		<form class="form-grid" method="post" novalidate>
			<div class="field field--full">
				<label for="username">Username</label>
				<input id="username" name="username" type="text" autocomplete="username" required>
			</div>

			<div class="field field--full">
				<label for="password">Password</label>
				<input id="password" name="password" type="password" autocomplete="current-password" required>
			</div>

			<div class="form-actions">
				<a class="action-button action-button--secondary" href="{{ url_for('home') }}">Back to Store</a>
				<button class="action-button" type="submit">Login</button>
			</div>
		</form>

		<div class="auth-help">
			Demo admin login: <strong>admin</strong> / <strong>admin123</strong>
		</div>
	</div>
</section>
{% endblock %}
