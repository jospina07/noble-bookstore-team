{% extends "base.html" %}

{% block content %}
<section>
	<h1 class="section-title">Our Collection</h1>

	<div class="catalog-grid">
		{% for book in books %}
			<article class="book-card">
				<div class="book-art">
					<span class="book-art__icon">&#128218;</span>
				</div>

				<div class="book-card__body">
					<h2>{{ book.title }}</h2>
					<p class="book-card__author">by {{ book.author }}</p>
					<p class="book-card__description">{{ book.description }}</p>

					<div class="book-card__footer">
						<span class="price">${{ '%.2f'|format(book.price) }}</span>
						<a class="action-button" href="{{ url_for('book_detail', book_id=book.id) }}">View Details</a>
					</div>
				</div>
			</article>
		{% endfor %}
	</div>
</section>
{% endblock %}
